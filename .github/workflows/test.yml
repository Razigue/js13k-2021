on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:
run-name: Two ships test
jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run lint
        continue-on-error: true
      - run: npm test
      - run: npm audit
